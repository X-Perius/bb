<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eylo Anlaşması</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f3f4f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }

        h1 { margin-bottom: 20px; }

        .countdown {
            font-size: 48px;
            margin: 20px 0;
        }

        .buttons { margin-top: 20px; }

        button {
            font-size: 16px;
            padding: 10px 20px;
            margin: 5px;
            border: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 420px;
        }

        .loading-bar {
            margin: 10px 0;
            background: #ddd;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar span {
            display: block;
            height: 100%;
            width: 0%;
            background: #4CAF50;
            transition: width 0.3s;
        }

        .loading-bar p {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
            color: white;
            font-size: 12px;
        }

        #statusText {
            margin-top: 10px;
            font-size: 14px;
            color: #444;
            min-height: 20px;
        }

        .cancel-btn {
            margin-top: 15px;
            background: #e74c3c;
        }
    </style>
</head>

<body>

<h1>Eylo Anlaşması</h1>

<div class="countdown" id="countdown">00:00:00</div>

<div class="buttons">
    <button onclick="readContract()">Anlaşmayı Oku</button>
    <button onclick="reject()">Redd et</button>
    <button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdHOP9NFpewa6SiwQfLQXDDHrIL4wESbc9BVL9XDHp-wWYIjg/viewform?usp=publish-editor','_blank')">
        İmzala
    </button>
</div>

<!-- Reject Modal -->
<div class="modal" id="rejectModal">
    <div class="modal-content">
        <p>Anlaşmayı Redd Etmeniz Durumunda Sistem Dosyaları Basın ve Medya Kurumlarına Dağıtıcakdır.</p>
        <button onclick="goBack()">Geri dön</button>
        <button onclick="proceed()">Devam Et</button>
    </div>
</div>

<!-- Loading Modal -->
<div class="modal" id="loadingModal">
    <div class="modal-content">

        <div class="loading-bar"><span id="bar1"></span><p>Medya Kurumları</p></div>
        <div class="loading-bar"><span id="bar2"></span><p>Basın</p></div>
        <div class="loading-bar"><span id="bar3"></span><p>Haber Sayfaları</p></div>

        <div id="statusText">Sistem hazırlanıyor...</div>

        <button class="cancel-btn" onclick="cancelProcess()">İptal Et</button>
    </div>
</div>

<script>

let countdownElement = document.getElementById('countdown');
let countdownInterval;
let statusInterval;
let cancelled = false;

function getEndOfDayTimestamp() {
    let saved = localStorage.getItem("endTime");

    if (saved) return parseInt(saved);

    let endOfDay = new Date();
    endOfDay.setHours(23, 59, 59, 999);

    let timestamp = endOfDay.getTime();
    localStorage.setItem("endTime", timestamp);

    return timestamp;
}

let endTime = getEndOfDayTimestamp();

function formatTime(seconds) {
    let h = Math.floor(seconds / 3600);
    let m = Math.floor((seconds % 3600) / 60);
    let s = seconds % 60;
    return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function updateCountdown() {
    let now = new Date().getTime();
    let diff = Math.floor((endTime - now) / 1000);

    if (diff <= 0) {
        countdownElement.textContent = "00:00:00";
        clearInterval(countdownInterval);
        return;
    }

    countdownElement.textContent = formatTime(diff);
}

function startCountdown() {
    updateCountdown();
    countdownInterval = setInterval(updateCountdown, 1000);
}

function readContract() {
    window.open('https://docs.google.com/document/d/19A684qcNO1vsMcM0Cu5-0eNBkySQyXlfmKSwqJaQ97g/edit?usp=sharing','_blank');
}

function reject() {
    document.getElementById('rejectModal').style.display = 'flex';
}

function goBack() {
    document.getElementById('rejectModal').style.display = 'none';
}

function cancelProcess() {
    cancelled = true;
    clearInterval(statusInterval);
    document.getElementById('loadingModal').style.display = 'none';
    alert("İşlem iptal edildi");
}

/* =========================
   TEK TEK BAR DOLDURMA
========================= */
function fillBar(bar) {
    return new Promise(resolve => {
        let progress = 0;

        function step() {
            if (cancelled) return;

            let pause = Math.random() < 0.15;
            let speed = 1 + Math.random() * 3;

            if (pause) {
                setTimeout(step, 500 + Math.random() * 1200);
                return;
            }

            progress += speed;

            if (progress >= 100) {
                progress = 100;
                bar.style.width = "100%";
                resolve();
                return;
            }

            bar.style.width = progress + "%";
            setTimeout(step, 80 + Math.random() * 180);
        }

        step();
    });
}

/* =========================
   ANA SÜREÇ (DÜZELTİLDİ)
========================= */
async function proceed() {

    cancelled = false;
    document.getElementById('rejectModal').style.display = 'none';
    document.getElementById('loadingModal').style.display = 'flex';

    let bars = [
        document.getElementById('bar1'),
        document.getElementById('bar2'),
        document.getElementById('bar3')
    ];

    let statusText = document.getElementById("statusText");

    let statuses = [
        "Bağlanıyor...",
        "Şifreleniyor...",
        "Veriler hazırlanıyor...",
        "Sunucuya erişiliyor...",
        "Medya ağına bağlanıyor...",
        "Paketler işleniyor..."
    ];

    statusInterval = setInterval(() => {
        if (cancelled) return;
        statusText.textContent = statuses[Math.floor(Math.random() * statuses.length)];
    }, 4000);

    // SIRALI VE GARANTİLİ
    for (let i = 0; i < bars.length; i++) {
        if (cancelled) return;
        await fillBar(bars[i]);
        await new Promise(r => setTimeout(r, 400));
    }

    clearInterval(statusInterval);

    if (cancelled) return;

    statusText.textContent = "İşlem tamamlandı ";

    setTimeout(() => {
        if (cancelled) return;
        document.getElementById('loadingModal').style.display = 'none';
        alert("Dosya aktarımı tamamlandı");
    }, 700);
}

window.onload = startCountdown;

</script>

</body>
</html>
